{% extends "base.html" %}
{% load jdatetime_tags %}

{% block content %}
<div class="container mt-5">
    <div class="card">
        <div class="card-header">
            <h3>Persian Calendar Test</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="test_date" class="form-label">Select Date (Persian Calendar):</label>
                    <input type="text" name="test_date" class="form-control persian-date-input" placeholder="1403/01/01">
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
            
            {% if submitted_date %}
            <div class="alert alert-info mt-3">
                <strong>Submitted Date (Gregorian):</strong> {{ submitted_date|date:"Y-m-d" }}<br>
                <strong>Submitted Date (Persian):</strong> {{ submitted_date|to_jalali:"%Y/%m/%d" }}
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
