{% extends "finance/finance_base.html" %}
{% block finance_content %}
<div class="card">
    <div class="card-header">
        <h3>Payroll Dashboard</h3>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-3">
                <div class="card bg-info text-white">
                    <div class="card-body">
                        <h5>Total Salaries</h5>
                        <h3>${{ total_salaries|floatformat:0 }}</h3>
                        <small>{{ current_year }}/{{ current_month }}</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning text-white">
                    <div class="card-body">
                        <h5>Pending</h5>
                        <h3>{{ pending_count }}</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h5>Paid</h5>
                        <h3>{{ paid_count }}</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
