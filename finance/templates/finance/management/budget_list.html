{% extends "finance/finance_base.html" %}
{% block title %}Budgets{% endblock %}
{% block finance_content %}
<div class="card">
    <div class="card-header">
        <h3><i class="bi bi-pie-chart"></i> Budget Management</h3>
    </div>
    <div class="card-body">
        <div class="alert alert-info">
            <i class="bi bi-info-circle"></i> Budget management feature coming soon.
        </div>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Year</th>
                    <th>Category</th>
                    <th>Planned</th>
                    <th>Actual</th>
                    <th>Variance</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="5" class="text-center">No budgets created</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
