{% extends "admin/base.html" %}
{% load static %}

{% block title %}{% if title %}{{ title }} | {% endif %}ATO Admin Panel{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}" style="color: white; text-decoration: none; font-size: 1.3rem; font-weight: 600;">
        ATO Admin Panel
    </a>
</div>
{% endblock %}

{% block nav-global %}{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        --admin-primary: #1c39bb;
        --admin-secondary: #145f84;
        --admin-accent: #4cb5ae;
        --admin-accent-soft: #e6f8f6;
        --admin-surface: #0f1117;
        --admin-surface-soft: #171c27;
        --admin-border: rgba(148, 163, 184, 0.28);
        --admin-text: #e5e7eb;
        --admin-muted: #94a3b8;
        --admin-sidebar-bg: #0f172a;
        --admin-sidebar-surface: #111f39;
        --admin-sidebar-text: #e2e8f0;
        --admin-sidebar-active: #1f7a8c;
    }

    * {
        box-sizing: border-box;
    }

    html, body {
        min-height: 100%;
    }

    body {
        font-family: "Segoe UI", "Poppins", "Trebuchet MS", sans-serif;
        background: #000000;
        color: var(--admin-text);
    }

    #header {
        background: linear-gradient(135deg, #12324a 0%, #1f7a8c 52%, #4cb5ae 100%);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
        position: relative;
        overflow: hidden;
    }

    #header::after {
        content: "";
        position: absolute;
        right: -24px;
        top: -24px;
        width: 180px;
        height: 180px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 255, 255, 0.26), transparent 70%);
        pointer-events: none;
    }

    #branding {
        position: relative;
        z-index: 1;
    }

    #branding h1, #branding h1 a {
        color: #fff !important;
        letter-spacing: 0.01em;
    }

    #site-name a {
        display: inline-flex;
        align-items: center;
        gap: 10px;
    }

    #site-name a::before {
        content: "";
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: linear-gradient(135deg, #ffffff, #b9fff7);
        box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.18);
    }

    #user-tools, #user-tools a {
        color: rgba(255, 255, 255, 0.96) !important;
        position: relative;
        z-index: 1;
    }

    #container {
        width: 100% !important;
        max-width: none !important;
        padding: 0 18px 24px;
    }

    #main {
        display: flex;
        align-items: flex-start;
        gap: 16px;
    }

    #content {
        width: 100% !important;
        margin-left: 0 !important;
        margin-right: 0 !important;
        flex: 1 1 auto;
        min-width: 0;
    }

    #content-main {
        width: 100% !important;
    }

    #content h1 {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 1.6rem;
        letter-spacing: -0.02em;
        margin-bottom: 14px;
        color: #e6f0ff;
    }

    #content h1::after {
        content: "";
        width: 42px;
        height: 4px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--admin-primary), var(--admin-accent));
    }

    #nav-sidebar {
        width: 280px;
        background: linear-gradient(180deg, var(--admin-sidebar-bg), #0b1326);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 12px 0 30px rgba(15, 23, 42, 0.22);
        border-radius: 0 18px 18px 0;
        color: var(--admin-sidebar-text);
        padding: 8px;
        flex: 0 0 280px;
        position: sticky;
        top: 12px;
        max-height: calc(100vh - 24px);
        overflow: auto;
    }

    #nav-sidebar .current-app > .module,
    #nav-sidebar .module {
        margin: 0 0 0.75rem;
        border-radius: 12px;
        overflow: hidden;
        background: var(--admin-sidebar-surface);
        box-shadow: none;
        border: 1px solid rgba(255, 255, 255, 0.08);
    }

    #nav-sidebar .module caption,
    .module h2,
    .inline-group h2 {
        background: linear-gradient(135deg, var(--admin-secondary), var(--admin-accent));
        color: #fff;
        border-radius: 14px 14px 0 0;
    }

    #nav-sidebar .module caption,
    #nav-sidebar .module h2 {
        background: transparent;
        color: #ffffff;
        border-radius: 0;
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding: 10px 12px 8px;
    }

    #nav-sidebar th,
    #nav-sidebar td {
        background: transparent;
        padding: 0;
    }

    #nav-sidebar a {
        display: block;
        border-radius: 8px;
        color: var(--admin-sidebar-text) !important;
        padding: 8px 10px;
        font-weight: 600;
        opacity: 0.92;
        transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
    }

    #nav-sidebar a:hover,
    #nav-sidebar .current-model a {
        background: var(--admin-sidebar-active);
        color: #ffffff !important;
        transform: translateX(3px);
        opacity: 1;
    }

    #nav-sidebar .current-model a {
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.25);
    }

    .dashboard .module,
    .module,
    .inline-group {
        border-radius: 18px;
        border: 1px solid var(--admin-border);
        box-shadow: 0 16px 32px rgba(15, 23, 42, 0.06);
        overflow: hidden;
        background: var(--admin-surface);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .dashboard .module:hover,
    .module:hover,
    .inline-group:hover {
        transform: translateY(-2px);
        box-shadow: 0 20px 36px rgba(15, 23, 42, 0.1);
    }

    .module h2,
    .inline-group h2 {
        padding: 12px 14px;
        margin: 0;
        font-weight: 700;
    }

    .dashboard #content {
        display: block !important;
    }

    .dashboard #content-main {
        float: none !important;
        width: 100% !important;
        margin: 0 !important;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 16px;
        align-items: stretch;
    }

    .dashboard #content-related {
        display: none !important;
    }

    .dashboard .module {
        border-radius: 14px;
        min-height: 100%;
    }

    .dashboard .module h2 {
        background: #1a2438;
        color: #f8fafc;
        border-bottom: 1px solid var(--admin-border);
        border-radius: 0;
        font-size: 0.82rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
    }

    .dashboard .module table td,
    .dashboard .module table th {
        padding: 11px 12px;
        font-size: 0.95rem;
    }

    .dashboard .module table a {
        font-weight: 600;
        color: #7dd3fc;
    }

    .dashboard .module table tr td,
    .dashboard .module table tr th {
        border-bottom: 1px solid rgba(148, 163, 184, 0.26);
        background: #0f1117;
        color: #e2e8f0;
    }

    .dashboard .module table tr:last-child td,
    .dashboard .module table tr:last-child th {
        border-bottom: 0;
    }

    .module table,
    .inline-group table,
    #result_list {
        width: 100%;
    }

    #result_list thead th,
    .module table thead th {
        background: #1a2438;
        color: #f8fafc;
        font-weight: 700;
        border-bottom: 1px solid var(--admin-border);
    }

    #result_list tbody tr:nth-child(even),
    .module table tbody tr:nth-child(even) {
        background: #141925;
    }

    #result_list tbody tr:hover,
    .module table tbody tr:hover {
        background: #1c2536;
    }

    #result_list tbody td,
    #result_list tbody th,
    .module table tbody td,
    .module table tbody th,
    .module table tbody td a,
    .module table tbody th a {
        color: #e2e8f0;
    }

    #result_list td,
    #result_list th,
    .module td,
    .module th {
        padding-top: 10px;
        padding-bottom: 10px;
    }

    .button, input[type=submit], input[type=button], .submit-row input, a.button {
        background: linear-gradient(135deg, var(--admin-primary), var(--admin-secondary));
        border: 0;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(28, 57, 187, 0.18);
        transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .button:hover, input[type=submit]:hover, input[type=button]:hover, a.button:hover {
        background: linear-gradient(135deg, var(--admin-secondary), var(--admin-primary));
        transform: translateY(-1px);
        box-shadow: 0 14px 24px rgba(20, 95, 132, 0.28);
        filter: saturate(1.05);
    }

    .button.default, input[type=submit].default, .submit-row input.default {
        background: linear-gradient(135deg, #0f4f70, #155f83);
    }

    .breadcrumbs {
        margin: 0 0 16px;
        border-radius: 14px;
        overflow: hidden;
        background: linear-gradient(135deg, var(--admin-secondary), var(--admin-primary));
        box-shadow: 0 10px 24px rgba(15, 95, 131, 0.18);
    }

    .object-tools a,
    .addlink, .changelink, .viewlink, .deletelink {
        border-radius: 999px;
    }

    .object-tools a {
        border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .module ul, .module table, .inline-group .tabular table {
        background: var(--admin-surface);
    }

    .selector,
    .calendar,
    .clockbox,
    .vDateField,
    .vTimeField,
    input[type=text],
    input[type=password],
    input[type=email],
    input[type=number],
    textarea,
    select {
        border: 1px solid var(--admin-border);
        border-radius: 12px;
        background: #fff;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type=text]:focus,
    input[type=password]:focus,
    input[type=email]:focus,
    input[type=number]:focus,
    textarea:focus,
    select:focus {
        border-color: rgba(31, 122, 140, 0.55);
        box-shadow: 0 0 0 3px rgba(31, 122, 140, 0.14);
        outline: none;
    }

    .help,
    .helptext {
        color: var(--admin-muted);
    }

    .addlink, .changelink, .viewlink, .deletelink {
        color: #93c5fd !important;
        font-weight: 700;
    }

    .addlink:hover, .changelink:hover, .viewlink:hover, .deletelink:hover {
        color: #bae6fd !important;
    }

    .messagelist li {
        border-radius: 12px;
        border: 1px solid transparent;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }

    .messagelist .success {
        border-color: rgba(22, 163, 74, 0.25);
    }

    .messagelist .warning {
        border-color: rgba(245, 158, 11, 0.25);
    }

    .messagelist .error {
        border-color: rgba(220, 38, 38, 0.25);
    }

    .aligned label, .form-row label {
        font-weight: 600;
        color: #d1d5db;
    }

    @keyframes adminFadeUp {
        from {
            opacity: 0;
            transform: translateY(8px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .dashboard .module,
    .module,
    .inline-group,
    .breadcrumbs,
    .messagelist li {
        animation: adminFadeUp 0.35s ease;
    }

    @media (max-width: 1024px) {
        #main {
            gap: 12px;
        }

        #nav-sidebar {
            width: 220px;
            padding: 6px;
            flex-basis: 220px;
        }

        .dashboard #content-main {
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }
    }

    @media (max-width: 767.98px) {
        #main {
            display: block;
        }

        #container {
            padding: 0 10px 16px;
        }

        #nav-sidebar {
            width: 100%;
            position: relative;
            border-radius: 16px;
            top: 0;
            max-height: none;
            overflow: visible;
            margin-bottom: 10px;
            flex: none;
        }

        #content h1 {
            font-size: 1.35rem;
        }

        .dashboard #content-main {
            grid-template-columns: 1fr;
            gap: 12px;
        }
    }
</style>
{% endblock %}
