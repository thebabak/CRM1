{% extends "admin/base.html" %}
{% load static %}

{% block title %}{% if title %}{{ title }} | {% endif %}ATO Admin Panel{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}" style="color: white; text-decoration: none; font-size: 1.3rem; font-weight: 600;">
        ATO Admin Panel
    </a>
</div>
{% endblock %}

{% block nav-global %}{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        --admin-primary: #1C39BB;
        --admin-secondary: #155f83;
        --admin-accent: #4cb5ae;
        --admin-surface: #ffffff;
        --admin-bg: #eef7f9;
        --admin-text: #111827;
    }

    html, body {
        min-height: 100%;
    }

    body {
        background:
            radial-gradient(circle at top left, rgba(28, 57, 187, 0.08), transparent 28%),
            radial-gradient(circle at top right, rgba(76, 181, 174, 0.12), transparent 32%),
            linear-gradient(135deg, #e8f7fa 0%, #f8fafc 100%);
        color: var(--admin-text);
    }

    #container {
        width: 100% !important;
        max-width: none !important;
        padding: 0 18px 24px;
        box-sizing: border-box;
    }

    #content {
        width: 100% !important;
        margin-left: 0 !important;
        margin-right: 0 !important;
    }

    #content-main {
        width: 100% !important;
    }

    #nav-sidebar {
        width: 280px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(14px);
        border-right: 1px solid rgba(148, 163, 184, 0.18);
        box-shadow: 12px 0 30px rgba(15, 23, 42, 0.06);
    }

    #nav-sidebar .current-app > .module,
    #nav-sidebar .module {
        margin: 0 0 0.75rem;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
    }

    #nav-sidebar .module caption,
    .module h2,
    .inline-group h2 {
        background: linear-gradient(135deg, var(--admin-secondary), var(--admin-accent));
        color: #fff;
        border-radius: 14px 14px 0 0;
    }

    .dashboard .module,
    .module,
    .inline-group {
        border-radius: 18px;
        border: 1px solid rgba(148, 163, 184, 0.16);
        box-shadow: 0 16px 32px rgba(15, 23, 42, 0.06);
        overflow: hidden;
        background: var(--admin-surface);
    }

    .module h2,
    .inline-group h2 {
        padding: 12px 14px;
        margin: 0;
        font-weight: 700;
    }

    .module table,
    .inline-group table,
    #result_list {
        width: 100%;
    }

    .button, input[type=submit], input[type=button], .submit-row input, a.button {
        background: linear-gradient(135deg, var(--admin-primary), var(--admin-secondary));
        border: 0;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(28, 57, 187, 0.18);
    }

    .button:hover, input[type=submit]:hover, input[type=button]:hover, a.button:hover {
        background: linear-gradient(135deg, var(--admin-secondary), var(--admin-primary));
    }

    .button.default, input[type=submit].default, .submit-row input.default {
        background: linear-gradient(135deg, #0f4f70, #155f83);
    }

    .breadcrumbs {
        margin: 0 0 16px;
        border-radius: 14px;
        overflow: hidden;
        background: linear-gradient(135deg, var(--admin-secondary), var(--admin-primary));
        box-shadow: 0 10px 24px rgba(15, 95, 131, 0.18);
    }

    #header {
        background: linear-gradient(135deg, #12324a 0%, #1f7a8c 52%, #4cb5ae 100%);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.14);
    }

    #branding h1, #branding h1 a {
        color: #fff !important;
    }

    #user-tools, #user-tools a {
        color: rgba(255, 255, 255, 0.95) !important;
    }

    .object-tools a,
    .addlink, .changelink, .viewlink, .deletelink {
        border-radius: 999px;
    }

    .module ul, .module table, .inline-group .tabular table {
        background: #fff;
    }

    .aligned label, .form-row label {
        font-weight: 600;
        color: #334155;
    }

    @media (max-width: 1024px) {
        #nav-sidebar {
            width: 220px;
        }
    }

    @media (max-width: 767.98px) {
        #container {
            padding: 0 10px 16px;
        }

        #nav-sidebar {
            width: 100%;
            position: relative;
        }
    }
</style>
{% endblock %}
