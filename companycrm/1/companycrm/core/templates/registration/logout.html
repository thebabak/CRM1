{% extends "base.html" %}
{% block title %}Sign out · Company CRM{% endblock %}
{% block content %}
  <div class="container-narrow">
    <h1 class="page-title mb-3">Sign out</h1>
    <p class="text-muted">Are you sure you want to sign out?</p>
    <form method="post">{% csrf_token %}
      <button class="btn btn-primary" type="submit">Yes, sign me out</button>
      <a class="btn btn-outline-secondary" href="{% url 'request_list' %}">Cancel</a>
    </form>
  </div>
{% endblock %}
